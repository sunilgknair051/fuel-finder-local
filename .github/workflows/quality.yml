name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Unit tests
        run: pytest
      - name: Lint
        run: ruff check .
      - name: Formatting
        run: ruff format --check .
      - name: Type checks
        run: mypy app scripts
